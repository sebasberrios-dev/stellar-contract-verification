services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    ports:
      - "8088:8088"
    environment:
      SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
      PORT: 8088
      ALLOWED_ORIGIN: "*"
      VERIFY_WORK_DIR: /tmp/soroban-verify
      DATABASE_URL: /var/lib/csv/verifications.db
      VERIFIER_ID: csv-stellar
      DEFAULT_NETWORK: testnet
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/soroban-verify:/tmp/soroban-verify
      - /var/lib/csv:/var/lib/csv
    restart: unless-stopped
