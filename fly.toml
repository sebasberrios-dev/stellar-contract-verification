app = "stellar-contract-verification"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8088"
  SOROBAN_RPC_URL = "https://soroban-testnet.stellar.org"

[vm]
  size = "performance-1x"

[[services]]
  internal_port = 8088
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    path = "/health"
    interval = "15s"
    timeout = "10s"
    grace_period = "30s"
