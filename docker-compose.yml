services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SOROBAN_RPC_URL=https://soroban-testnet.stellar.org
      - PORT=8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/soroban-verify:/tmp/soroban-verify
    restart: unless-stopped
